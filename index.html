<!DOCTYPE html>
<html>
<head>
    <title>Punjabi Tadka Dhaba</title>

    <style>
        body {
            font-family: "Times New Roman";
            font-size: 18px;
            line-height: 1.15;
            text-align: justify;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background: linear-gradient(to right, #8B0000, #b22222);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        /* Top-right buttons */
        .nav-buttons {
            position: absolute;
            top: 15px;
            right: 20px;
        }

        .nav-buttons button {
            margin-left: 10px;
            padding: 6px 12px;
            border: none;
            background: white;
            color: #8B0000;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        h1 { font-size: 24px; }
        h2 { font-size: 18px; }
        h3 { font-size: 14px; }

        .section { padding: 20px; }

        #menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .item {
            background: white;
            margin: 10px;
            padding: 10px;
            width: 220px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .item img {
            width: 100%;
            height: 130px;
            border-radius: 10px;
        }

        button {
            margin: 5px;
            padding: 6px 10px;
            border: none;
            background: #8B0000;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete { background: red; }
        .edit { background: orange; }
        .order-btn { background: green; }

        .form {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            margin: 5px;
            padding: 8px;
            width: 200px;
        }

        .cart {
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Punjabi Tadka Dhaba 🍛</h1>
    <p>Authentic Vegetarian Punjabi Food</p>

    <div class="nav-buttons">
        <button onclick="window.open('about.html','_blank')">About Us</button>
        <button onclick="window.open('contact.html','_blank')">Contact Us</button>
    </div>
</header>

<div class="section">

    <div class="form">
        <h3>Add New Item</h3>
        <input id="name" placeholder="Item Name">
        <input id="price" type="number" placeholder="Price">
        <input id="img" placeholder="Image URL"><br>
        <button onclick="addItem()">Add Item</button>
    </div>

    <div id="menu"></div>

    <div class="cart">
        🛒 Items: <span id="count">0</span> |
        💰 Total: ₹<span id="total">0</span>
        <br><br>
        <button class="order-btn" onclick="placeOrder()">Place Order</button>
    </div>


</div>

<script>
let menu = JSON.parse(localStorage.getItem("menu")) || [
    {name:"Dal Makhani", price:220, img:"https://images.unsplash.com/photo-1625944525533-473f1c7d54e7"},
    {name:"Shahi Paneer", price:260, img:"https://images.unsplash.com/photo-1631452180519-c014fe946bc7"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save() {
    localStorage.setItem("menu", JSON.stringify(menu));
    localStorage.setItem("cart", JSON.stringify(cart));
}

function showMenu() {
    let div = document.getElementById("menu");
    div.innerHTML = "";

    menu.forEach((item, index) => {
        div.innerHTML += `
        <div class="item">
            <img src="${item.img}">
            <h4>${item.name}</h4>
            <p>₹${item.price}</p>

            <button onclick="addToCart(${index})">Add</button>
            <button class="edit" onclick="editPrice(${index})">Edit Price</button>
            <button class="delete" onclick="deleteItem(${index})">Delete</button>
        </div>
        `;
    });
}

function addItem() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let img = document.getElementById("img").value;

    if (!name || !price || !img) {
        alert("Fill all fields");
        return;
    }

    menu.push({name, price:Number(price), img});
    save();
    showMenu();
}

function deleteItem(index) {
    menu.splice(index, 1);
    save();
    showMenu();
}

function editPrice(index) {
    let newPrice = prompt("Enter new price:");
    if (newPrice && !isNaN(newPrice)) {
        menu[index].price = Number(newPrice);
        save();
        showMenu();
    }
}

function addToCart(index) {
    let item = menu[index];

    let found = cart.find(i => i.name === item.name);

    if (found) {
        found.qty++;
    } else {
        cart.push({...item, qty:1});
    }

    updateCart();
    save();
}

function updateCart() {
    let count = 0;
    let total = 0;

    cart.forEach(i => {
        count += i.qty;
        total += i.price * i.qty;
    });

    document.getElementById("count").innerText = count;
    document.getElementById("total").innerText = total;
}

function placeOrder() {
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    let summary = "🧾 Order Summary:\n\n";

    cart.forEach(item => {
        summary += `${item.name} x ${item.qty} = ₹${item.price * item.qty}\n`;
    });

    summary += `\nTotal = ₹${document.getElementById("total").innerText}`;

    alert(summary + "\n\n✅ Order Placed Successfully!");

    cart = [];
    save();
    updateCart();
}

showMenu();
updateCart();
</script>

</body>
</html>
